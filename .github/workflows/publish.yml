name: release & publish

# Single workflow that, on every push to main:
#   1. release-please scans Conventional Commits and maintains one release
#      PR (bumps version + CHANGELOG). Merging that PR makes release-please
#      create the GitHub release + tag and set release_created=true.
#   2. The publish job then builds, tests, and publishes to npm — in the
#      SAME workflow run as the release.
#
# Why both jobs live here (and not a separate `release: published` workflow):
# events raised by the default GITHUB_TOKEN do NOT start new workflow runs
# (GitHub's recursion guard). A standalone publish workflow keyed off the
# release event would therefore never fire when release-please cuts the
# release. Running publish in the same run sidesteps that entirely.
#
# The file is named publish.yml on purpose: the npm Trusted Publisher
# binding is pinned to this filename, so keeping it avoids reconfiguring
# npm.
#
# Auth: npm Trusted Publishing (OIDC) — no long-lived token. Requires:
#   - npm >= 11.5.1 on the runner (Node 22 bundles 10.9.x, which has no
#     OIDC support); the "Upgrade npm" step handles this.
#   - A Trusted Publisher entry on the package:
#       npmjs.com -> @caor/iwinv-alimtalk -> Settings -> Publishing access
#       -> Trusted Publisher -> GitHub Actions
#         caorteam / iwinv-alimtalk / publish.yml
#   - package.json "repository.url" matching the repo (provenance check).

on:
  push:
    branches: [main]

# No permissions by default; each job opts into exactly what it needs.
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          # release-please needs full history to detect changes since the
          # last release tag.
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use the config + manifest committed in the repo. This keeps
          # release behavior reproducible and reviewable.
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    # Only when release-please actually cut a release on this run.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm to mint a short-lived OIDC token for Trusted
      # Publishing and to sign provenance.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      # Node 22 bundles npm 10.9.x, which predates OIDC Trusted Publishing.
      # Upgrade to a version (>= 11.5.1) that can mint an OIDC token.
      - name: Upgrade npm for Trusted Publishing (OIDC)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check (no emit)
        run: npx tsc -p tsconfig.json --noEmit

      - name: Run tests
        run: npm test

      - name: Enforce 100% coverage gate
        run: npm run test:coverage

      # No NODE_AUTH_TOKEN: with npm >= 11.5.1 and `id-token: write`, npm
      # detects the GitHub Actions OIDC environment, exchanges it for a
      # short-lived registry token via the package's Trusted Publisher
      # config, and attaches provenance automatically.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
