name: publish

# Triggered by a GitHub release created by release-please.
# Publishes to npm with provenance so consumers can verify the package
# was built from this repo by this workflow.
#
# Authentication uses npm Trusted Publishing (OIDC), not a long-lived
# token. Two prerequisites must both hold or the publish fails:
#
#   1. npm CLI >= 11.5.1 on the runner. Node 22 ships npm 10.9.x, which
#      has NO OIDC support — with no token it falls straight through to
#      ENEEDAUTH. The "Upgrade npm" step below pulls a version that can
#      mint an OIDC token.
#   2. The package must list this repo + workflow as a Trusted Publisher:
#        npmjs.com -> @caor/iwinv-alimtalk -> Settings -> Publishing access
#        -> Trusted Publisher -> GitHub Actions
#          Organization/user:  caorteam
#          Repository:         iwinv-alimtalk
#          Workflow filename:  publish.yml
#      Until that is configured, OIDC exchange is rejected by the registry.
#
# See: https://docs.npmjs.com/trusted-publishers

on:
  release:
    types: [published]

# Default token only; we'll mint a short-lived npm token via OIDC.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      # Node 22 bundles npm 10.9.x, which predates OIDC Trusted Publishing.
      # Upgrade to a version (>= 11.5.1) that can mint an OIDC token.
      - name: Upgrade npm for Trusted Publishing (OIDC)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check (no emit)
        run: npx tsc -p tsconfig.json --noEmit

      - name: Run tests
        run: npm test

      - name: Enforce 100% coverage gate
        run: npm run test:coverage

      # No NODE_AUTH_TOKEN: with npm >= 11.5.1 and `id-token: write`, npm
      # detects the GitHub Actions OIDC environment, exchanges it for a
      # short-lived registry token via the package's Trusted Publisher
      # config, and attaches provenance automatically.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
